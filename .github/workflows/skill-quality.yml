name: Skill quality

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install PyYAML
      - run: python -X utf8 scripts/validate_skills.py --baseline quality-baseline.json
      - run: python -X utf8 scripts/routing_smoke_test.py
